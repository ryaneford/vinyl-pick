version: '3.8'

services:
  vinyl-pick:
    build:
      context: /home/ryan/vinyl-pick
      dockerfile: Dockerfile
    container_name: vinyl-pick
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_OAUTH_CALLBACK=https://random.minitrash.com/api/oauth/callback
      - OAUTH_BASE_URL=https://random.minitrash.com
      - DISCOGS_CONSUMER_KEY=your_consumer_key
      - DISCOGS_CONSUMER_SECRET=your_consumer_secret
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s